name: Build APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar Android SDK
        uses: android-actions/setup-android@v3

      - name: Dar permiso de ejecucion a gradlew
        run: chmod +x ./gradlew

      - name: Compilar APK y AAB release firmados
        run: ./gradlew assembleRelease bundleRelease --no-daemon --stacktrace

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: simn-app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Subir AAB
        uses: actions/upload-artifact@v4
        with:
          name: simn-app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
